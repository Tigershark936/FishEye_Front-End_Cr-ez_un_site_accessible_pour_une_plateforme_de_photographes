  <body>
    <header>
      <a href="index.html" title="Fisheye Home page">
        <img src="assets/images/logo.png" class="logo" alt="fisheye logo" />
      </a>
    </header>

    <main id="main">

    </main>
    

    <section>
      <label for="filter-select">Trier par</label>
        <select name="filters" id="filter-select" class="container-filter-select">
          <option class="filter-by-popularity" value="popularity">Popularité</option>
          <option class="filter-by-date" value="date">Date</option>
          <option class="filter-by-title" value="title">Titre</option>
        </select>
    </section>

    <div id="contact_modal">
      <div class="modal">
        <header>
          <h2>Contactez-moi</h2>
          <img src="assets/icons/close.svg" onclick="closeModal()" />
        </header>

        <form>
          <div>
            <label for="firstname">Prénom</label>
            <input type="text" name="firstname" id="firstname" />
            <label for="surname">Nom</label>
            <input type="text" name="surname" id="surname" />
            <label for="email">Email</label>
            <input type="email" name="email" id="email" />
            <label for="contact_message">Votre message</label>
            <input type="text" name="contact_message" id="contact_message" />
          </div>
          <button type="submit" class="contact_button">Envoyer</button>
        </form>
      </div>
    </div>

    <script src="/scripts/pages/photographer.js"></script>
    <script src="/scripts/utils/contactForm.js"></script>
